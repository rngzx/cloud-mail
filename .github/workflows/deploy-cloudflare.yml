name: 🚀 Deploy cloud-mail to Cloudflare Workers

on:
  push:
    branches: [ main ]
    paths:
      - "mail-worker/**"
      - "mail-vue/**"
  workflow_dispatch:

jobs:
  deploy:
    name: 🏗️ Build and Deploy
    runs-on: ubuntu-latest

    env:
      NAME: ${{ secrets.NAME || vars.NAME || 'cloud-mail' }}
      CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN || vars.CUSTOM_DOMAIN }}
      DOMAIN: ${{ secrets.DOMAIN || vars.DOMAIN }}
      ADMIN: ${{ secrets.ADMIN || vars.ADMIN }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || vars.JWT_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID || vars.D1_DATABASE_ID }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID || vars.KV_NAMESPACE_ID }}
      PROJECT_LINK: ${{ secrets.PROJECT_LINK || vars.PROJECT_LINK }}
      AI_MODEL: ${{ secrets.AI_MODEL || vars.AI_MODEL || '@cf/meta/llama-3.1-8b-instruct' }}
      CLOUDFLARE_EMAIL: ${{ secrets.CF_EMAIL || vars.CF_EMAIL || false }}
      ANALYSIS_CACHE: ${{ secrets.ANALYSIS_CACHE || vars.ANALYSIS_CACHE || false }}
      LINUXDO_CLIENT_ID: ${{ secrets.LINUXDO_CLIENT_ID || vars.LINUXDO_CLIENT_ID }}
      LINUXDO_CLIENT_SECRET: ${{ secrets.LINUXDO_CLIENT_SECRET || vars.LINUXDO_CLIENT_SECRET }}
      LINUXDO_CALLBACK_URL: ${{ secrets.LINUXDO_CALLBACK_URL || vars.LINUXDO_CALLBACK_URL }}
      LINUXDO_SWITCH: ${{ secrets.LINUXDO_SWITCH || vars.LINUXDO_SWITCH }}

    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v4

      # =========================
      # ⚙️ Setup Node.js 24
      # =========================
      - name: ⚙️ Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # =========================
      # 📦 最稳定的 pnpm 安装方式
      # =========================
      - name: 📦 Install pnpm
        run: npm install -g pnpm@9.12.0

      # =========================
      # Install deps
      # =========================
      - name: 📦 Install dependencies
        working-directory: ./mail-worker
        run: pnpm install --frozen-lockfile

      # =========================
      # Wrangler
      # =========================
      - name: ⚙️ Install Wrangler
        working-directory: ./mail-worker
        run: npm install -g wrangler@4.90.0

      - name: 📡 Disable telemetry
        working-directory: ./mail-worker
        run: wrangler telemetry disable

      # =========================
      # Env setup (修复：加入域名的替换逻辑)
      # =========================
      - name: 🛠️ Environment setup
        working-directory: ./mail-worker
        run: |
          if [ -z "$JWT_SECRET" ]; then exit 1; fi
          if [ -z "$ADMIN" ]; then exit 1; fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then exit 1; fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then exit 1; fi

          CONFIG_FILE="wrangler-action.toml"

          sed -i "s|\${NAME}|${NAME}|g" "$CONFIG_FILE"
          sed -i "s|\${ADMIN}|${ADMIN}|g" "$CONFIG_FILE"
          sed -i "s|\${JWT_SECRET}|${JWT_SECRET}|g" "$CONFIG_FILE"
          
          # 【修复点】加入域名的替换逻辑，把占位符替换成你的真实域名
          sed -i "s|\${custom_domain}|${CUSTOM_DOMAIN}|g" "$CONFIG_FILE"
          sed -i "s|\${CUSTOM_DOMAIN}|${CUSTOM_DOMAIN}|g" "$CONFIG_FILE"
          
          # 【魔法指令】强行剔除 R2 绑定
          awk '/\[\[r2_buckets\]\]/{flag=1; next} /^\[.*\]/{flag=0} !flag' "$CONFIG_FILE" > temp.toml && mv temp.toml "$CONFIG_FILE"

      # =========================
      # KV setup 
      # =========================
      - name: ⚡ KV setup
        working-directory: ./mail-worker
        run: |
          if [ -n "$KV_NAMESPACE_ID" ]; then
            sed -i "s|\${KV_NAMESPACE_ID}|${KV_NAMESPACE_ID}|g" wrangler-action.toml
            exit 0
          fi

          OUTPUT=$(wrangler kv namespace create $NAME)
          echo "KV Output: $OUTPUT"
          
          KV_ID=$(echo "$OUTPUT" | grep -oE "id\s*=\s*\"[^\"]+\"" | head -n 1 | cut -d \" -f 2)
          
          if [ -z "$KV_ID" ]; then
            echo "❌ Failed to extract KV_ID"
            exit 1
          fi
          
          sed -i "s|\${KV_NAMESPACE_ID}|$KV_ID|g" wrangler-action.toml

      # =========================
      # D1 setup
      # =========================
      - name: 🐬 D1 setup
        working-directory: ./mail-worker
        run: |
          if [ -n "$D1_DATABASE_ID" ]; then
            sed -i "s|\${D1_DATABASE_ID}|${D1_DATABASE_ID}|g" wrangler-action.toml
            exit 0
          fi

          OUTPUT=$(wrangler d1 create $NAME)
          echo "D1 Output: $OUTPUT"
          
          DB_ID=$(echo "$OUTPUT" | grep -oE "[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}" | head -n 1)
          
          if [ -z "$DB_ID" ]; then
            echo "❌ Failed to extract D1_DATABASE_ID"
            exit 1
          fi
          
          sed -i "s|\${D1_DATABASE_ID}|$DB_ID|g" wrangler-action.toml

      # =========================
      # Deploy
      # =========================
      - name: 🚀 Deploy Worker
        id: deploy
        working-directory: ./mail-worker
        run: |
          echo "Starting Wrangler deployment..."
          
          if ! wrangler deploy -c wrangler-action.toml > deploy_log.txt 2>&1; then
            cat deploy_log.txt
            echo "❌ Deployment failed! Check the errors above."
            exit 1
          fi
          
          cat deploy_log.txt
          WORKER_URL=$(grep -Eo "https://[a-zA-Z0-9.-]+\.workers\.dev" deploy_log.txt | head -n 1)
          echo "worker_url=$WORKER_URL" >> $GITHUB_OUTPUT

      # =========================
      # Init DB
      # =========================
      - name: ♻️ Init database
        run: |
          sleep 10

          URL="${CUSTOM_DOMAIN:+https://$CUSTOM_DOMAIN}"
          URL="${URL:-${{ steps.deploy.outputs.worker_url }}}"

          curl -f "$URL/api/init/$JWT_SECRET" || exit 1
